name: reminders

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 min; the script no-ops until a reminder is due
  workflow_dispatch: {} # manual "Run workflow" button (also used to retry a failed send)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --prefix scripts
      - run: node scripts/reminders.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
